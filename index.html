<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quit Zyn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent-dim: #3d3a80;
      --danger: #ff5c5c;
      --success: #3ddc97;
      --warn: #ffd166;
      --orange: #f4a261;
      --text: #e8eaf6;
      --muted: #7b7f9e;
      --border: #2e3250;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 1rem;
    }

    /* Setup */
    #setup { text-align: center; }
    #setup h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
    #setup p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-align: left;
    }

    input[type="date"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="date"]:focus, input[type="number"]:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
    }
    .btn-outline:hover { border-color: var(--muted); color: var(--text); opacity: 1; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1rem;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 0.3rem; }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-card.highlight .stat-value { color: var(--success); }

    /* Today card */
    .today-card { text-align: center; }

    .today-count {
      font-size: 4.5rem;
      font-weight: 900;
      line-height: 1;
      margin: 0.4rem 0 0.1rem;
      transition: color 0.3s;
    }
    .today-count.c-zero  { color: var(--success); }
    .today-count.c-good  { color: var(--warn); }
    .today-count.c-near  { color: var(--orange); }
    .today-count.c-over  { color: var(--danger); }

    .allowance-sub {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .allowance-sub strong { color: var(--text); }

    /* Progress bar */
    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
    }
    .progress-fill.c-zero { background: var(--success); width: 100%; opacity: 0.25; }
    .progress-fill.c-good { background: var(--warn); }
    .progress-fill.c-near { background: var(--orange); }
    .progress-fill.c-over { background: var(--danger); width: 100% !important; }

    .today-date-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.25rem;
    }

    .add-btn { font-size: 1rem; padding: 0.9rem; border-radius: 12px; margin-bottom: 0.6rem; }

    .undo-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      width: auto;
    }
    .undo-btn:hover { border-color: var(--muted); color: var(--text); }
    .undo-btn:disabled { opacity: 0.3; cursor: default; }

    /* History */
    .card-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 220px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0.75rem;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .history-date { color: var(--muted); }

    .badge {
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.78rem;
    }
    .badge-zero { background: #1a3d2e; color: var(--success); }
    .badge-low  { background: #3d3010; color: var(--warn); }
    .badge-mid  { background: #3d2810; color: var(--orange); }
    .badge-high { background: #3d1010; color: var(--danger); }

    .empty-msg { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 1rem 0; }

    /* Quit plan */
    .plan-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .plan-list::-webkit-scrollbar { width: 4px; }
    .plan-list::-webkit-scrollbar-track { background: transparent; }
    .plan-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .plan-phase {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 10px;
      border-left: 3px solid transparent;
      background: var(--surface2);
      font-size: 0.82rem;
      transition: background 0.2s;
    }
    .plan-phase.past {
      opacity: 0.45;
      border-left-color: var(--border);
    }
    .plan-phase.current {
      background: #1e1f3a;
      border-left-color: var(--accent);
      opacity: 1;
    }
    .plan-phase.future {
      border-left-color: var(--border);
    }
    .plan-phase.quit-phase {
      border-left-color: var(--success);
      background: #0f2a1e;
    }
    .plan-phase.quit-phase.current {
      background: #143322;
      border-left-color: var(--success);
    }

    .phase-status {
      font-size: 0.85rem;
      width: 1.1rem;
      text-align: center;
      flex-shrink: 0;
    }

    .phase-info {
      flex: 1;
      min-width: 0;
    }
    .phase-name {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .phase-dates {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.1rem;
    }

    .phase-pill {
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0.22rem 0.6rem;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-high   { background: #3d1010; color: var(--danger); }
    .pill-mid    { background: #3d2810; color: var(--orange); }
    .pill-low    { background: #3d3010; color: var(--warn); }
    .pill-tiny   { background: #1a2a40; color: #7ec8e3; }
    .pill-quit   { background: #1a3d2e; color: var(--success); }
    .pill-past   { background: var(--surface); color: var(--muted); }

    .plan-current-tag {
      font-size: 0.68rem;
      background: var(--accent-dim);
      color: #a89fff;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    /* Reset */
    .reset-section { width: 100%; max-width: 420px; text-align: center; }

    .hidden { display: none !important; }

    @media (max-width: 380px) {
      .today-count { font-size: 3.5rem; }
      .stat-value  { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <h1>Quit Zyn</h1>
  <p class="subtitle">Every pouch you skip is a win.</p>

  <!-- SETUP -->
  <div class="card" id="setup">
    <h2>Start your journey</h2>
    <p>Enter the date you want to be completely free, and how many pouches you're using now. We'll build a tapering plan that gets you there.</p>
    <label for="quitDate">Target quit date</label>
    <input type="date" id="quitDate" />
    <label for="dailyAvg">Average pouches per day (right now)</label>
    <input type="number" id="dailyAvg" min="1" max="50" placeholder="e.g. 10" />
    <button class="btn" onclick="startJourney()">Let's do this</button>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden" style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:0;">

    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-value" id="dayCount">0</div>
        <div class="stat-label">Days in</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-value" id="streakCount">0</div>
        <div class="stat-label">Clean streak <span id="streakFire"></span></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalAvoided">0</div>
        <div class="stat-label">Pouches avoided</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="moneySaved">$0</div>
        <div class="stat-label">Approx. saved</div>
      </div>
    </div>

    <div class="card today-card">
      <div class="today-date-label" id="todayDate"></div>
      <div class="today-count c-zero" id="todayCount">0</div>
      <div class="allowance-sub" id="allowanceSub"></div>
      <div class="progress-wrap">
        <div class="progress-fill c-zero" id="progressFill" style="width:100%"></div>
      </div>
      <button class="btn add-btn" onclick="addPouch()">+ Had a pouch</button>
      <button class="undo-btn" id="undoBtn" onclick="undoPouch()" disabled>Undo last</button>
    </div>

    <div class="card" style="width:100%;">
      <div class="card-title">Recent history</div>
      <ul class="history-list" id="historyList"></ul>
    </div>

    <div class="card" style="width:100%;">
      <div class="card-title">Your quit plan</div>
      <ul class="plan-list" id="planList"></ul>
    </div>

    <div class="reset-section">
      <button class="btn btn-outline" onclick="confirmReset()">Reset all data</button>
    </div>

  </div>

  <script>
    const PRICE_PER_POUCH = 0.75;
    const PHASE_DAYS = 7;
    const STORAGE_KEY = "zyn_tracker";

    function getState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateStr(d) {
      return d.toISOString().slice(0, 10);
    }

    function fmtDate(ds) {
      return new Date(ds + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    // Build taper phases from startDate to quitDate, halving allowance each phase.
    // Phases are sized evenly to exactly fill the window; the quit phase starts on quitDate.
    function buildPlan(startDateStr, quitDateStr, dailyAvg) {
      // Build the halving sequence down to 1
      const halvings = [];
      let val = dailyAvg;
      while (val > 0) {
        halvings.push(val);
        val = val === 1 ? 0 : Math.ceil(val / 2);
      }

      const startDate = new Date(startDateStr + "T00:00:00");
      const quitDate  = new Date(quitDateStr  + "T00:00:00");
      const totalDays = Math.round((quitDate - startDate) / 86400000);
      const numPhases = halvings.length;

      // Distribute days evenly; spread any remainder across the first phases
      const baseDays  = Math.max(1, Math.floor(totalDays / numPhases));
      const extraDays = Math.max(0, totalDays - baseDays * numPhases);

      const phases = [];
      let cursor = new Date(startDate);

      halvings.forEach((allowed, i) => {
        const days = baseDays + (i < extraDays ? 1 : 0);
        const end  = new Date(cursor);
        end.setDate(end.getDate() + days - 1);
        phases.push({ allowed, start: dateStr(cursor), end: dateStr(end) });
        cursor = new Date(end);
        cursor.setDate(cursor.getDate() + 1);
      });

      // Quit phase starts exactly on the target quit date
      phases.push({ allowed: 0, start: quitDateStr, end: null });
      return phases;
    }

    function getCurrentPhaseIndex(phases, today) {
      for (let i = 0; i < phases.length - 1; i++) {
        if (today >= phases[i].start && today <= phases[i].end) return i;
      }
      return phases.length - 1;
    }

    function pillClass(allowed, dailyAvg) {
      if (allowed === 0) return "pill-quit";
      const ratio = allowed / dailyAvg;
      if (ratio > 0.6) return "pill-high";
      if (ratio > 0.3) return "pill-mid";
      if (ratio > 0.1) return "pill-low";
      return "pill-tiny";
    }

    function countColorClass(count, allowed) {
      if (count === 0) return "c-zero";
      if (allowed === 0) return "c-over";
      if (count > allowed) return "c-over";
      if (count === allowed) return "c-near";
      return "c-good";
    }

    function startJourney() {
      const dateInput = document.getElementById("quitDate").value;
      const avgInput = parseInt(document.getElementById("dailyAvg").value, 10);
      if (!dateInput) { alert("Please pick a target quit date."); return; }
      if (dateInput <= todayStr()) { alert("Target quit date must be in the future."); return; }
      if (!avgInput || avgInput < 1) { alert("Please enter your average daily usage."); return; }
      const state = { startDate: todayStr(), quitDate: dateInput, dailyAvg: avgInput, log: {} };
      saveState(state);
      showApp(state);
    }

    function showApp(state) {
      document.getElementById("setup").classList.add("hidden");
      const app = document.getElementById("app");
      app.classList.remove("hidden");
      app.style.display = "flex";
      render(state);
    }

    function render(state) {
      const today = todayStr();
      const startDate = new Date(state.startDate + "T00:00:00");
      const now = new Date(); now.setHours(0, 0, 0, 0);

      const daysSince = Math.max(0, Math.floor((now - startDate) / 86400000));
      const todayCount = state.log[today] ?? 0;

      // Build plan and find current allowance
      const phases = buildPlan(state.startDate, state.quitDate, state.dailyAvg);
      const phaseIdx = getCurrentPhaseIndex(phases, today);
      const allowed = phases[phaseIdx].allowed;

      // Streak (consecutive days at or under allowance going back from today)
      let streak = 0;
      const d = new Date(now);
      while (true) {
        const ds = dateStr(d);
        if (d < startDate) break;
        const pi = getCurrentPhaseIndex(phases, ds);
        const dayAllowed = phases[pi].allowed;
        const dayCount = state.log[ds] ?? 0;
        if (dayCount <= dayAllowed) { streak++; d.setDate(d.getDate() - 1); }
        else break;
      }

      // Pouches avoided (vs original daily avg * days elapsed)
      const totalConsumed = Object.values(state.log).reduce((a, b) => a + b, 0);
      const totalExpected = daysSince * state.dailyAvg;
      const avoided = Math.max(0, totalExpected - totalConsumed);
      const moneySaved = (avoided * PRICE_PER_POUCH).toFixed(0);

      // Stats
      document.getElementById("dayCount").textContent = daysSince;
      document.getElementById("streakCount").textContent = streak;
      document.getElementById("streakFire").textContent = streak >= 3 ? "🔥" : "";
      document.getElementById("totalAvoided").textContent = avoided;
      document.getElementById("moneySaved").textContent = "$" + moneySaved;

      // Today card
      document.getElementById("todayDate").textContent = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

      const cc = countColorClass(todayCount, allowed);
      const tc = document.getElementById("todayCount");
      tc.textContent = todayCount;
      tc.className = "today-count " + cc;

      // Allowance sub-text
      const sub = document.getElementById("allowanceSub");
      if (allowed === 0) {
        sub.innerHTML = todayCount === 0
          ? "<strong>No pouches today — you're free.</strong>"
          : `<strong style="color:var(--danger)">${todayCount} over your limit</strong> — quit day!`;
      } else {
        const remaining = Math.max(0, allowed - todayCount);
        sub.innerHTML = todayCount === 0
          ? `<strong>${allowed}</strong> pouches allowed today`
          : todayCount > allowed
            ? `<strong style="color:var(--danger)">${todayCount - allowed} over</strong> your limit of ${allowed}`
            : `<strong>${remaining}</strong> remaining of ${allowed} allowed`;
      }

      // Progress bar
      const fill = document.getElementById("progressFill");
      fill.className = "progress-fill " + cc;
      if (cc === "c-zero") {
        fill.style.width = "100%";
      } else if (cc === "c-over" || allowed === 0) {
        fill.style.width = "100%";
      } else {
        fill.style.width = Math.min(100, (todayCount / allowed) * 100) + "%";
      }

      document.getElementById("undoBtn").disabled = todayCount === 0;

      // History
      const list = document.getElementById("historyList");
      list.innerHTML = "";
      const days = [];
      for (let i = 0; i <= 13; i++) {
        const dd = new Date(now); dd.setDate(dd.getDate() - i);
        const ds = dateStr(dd);
        if (dd >= startDate) days.push({ ds, count: state.log[ds] ?? 0 });
      }
      if (days.length === 0) {
        list.innerHTML = '<li class="empty-msg">No history yet.</li>';
      } else {
        days.forEach(({ ds, count }) => {
          const li = document.createElement("li");
          li.className = "history-item";
          const pi = getCurrentPhaseIndex(phases, ds);
          const dayAllowed = phases[pi].allowed;
          let badgeClass, badgeText;
          if (count === 0) {
            badgeClass = "badge badge-zero"; badgeText = "Clean ✓";
          } else if (count <= dayAllowed) {
            const ratio = count / (state.dailyAvg || 1);
            badgeClass = "badge " + (ratio > 0.5 ? "badge-mid" : "badge-low");
            badgeText = count + (count === 1 ? " pouch" : " pouches");
          } else {
            badgeClass = "badge badge-high";
            badgeText = count + " pouches";
          }
          const dateLabel = new Date(ds + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
          li.innerHTML = `<span class="history-date">${dateLabel}</span><span class="${badgeClass}">${badgeText}</span>`;
          list.appendChild(li);
        });
      }

      // Quit plan
      renderPlan(phases, phaseIdx, state.dailyAvg, today);
    }

    function renderPlan(phases, currentIdx, dailyAvg, today) {
      const list = document.getElementById("planList");
      list.innerHTML = "";

      phases.forEach((phase, i) => {
        const li = document.createElement("li");
        const isPast    = i < currentIdx;
        const isCurrent = i === currentIdx;
        const isQuit    = phase.allowed === 0;

        let phaseClass = isQuit ? "plan-phase quit-phase" : "plan-phase";
        if (isPast) phaseClass += " past";
        else if (isCurrent) phaseClass += " current";
        else phaseClass += " future";

        li.className = phaseClass;

        // Status icon
        let icon = isPast ? "✓" : isCurrent ? "▶" : "·";
        if (isQuit && isCurrent) icon = "★";
        if (isQuit && isPast)    icon = "★";

        // Date range label
        let dateRange;
        if (isQuit) {
          dateRange = fmtDate(phase.start) + " onwards";
        } else {
          dateRange = fmtDate(phase.start) + " – " + fmtDate(phase.end);
        }

        // Phase name
        const phaseName = isQuit ? "Quit!" : `Phase ${i + 1}`;
        const currentTag = isCurrent ? '<span class="plan-current-tag">now</span>' : "";

        // Pill
        const pc = isPast ? "pill-past" : pillClass(phase.allowed, dailyAvg);
        const pillText = isQuit ? "0 / day — free!" : phase.allowed + (phase.allowed === 1 ? " pouch/day" : " pouches/day");

        li.innerHTML = `
          <span class="phase-status">${icon}</span>
          <div class="phase-info">
            <div class="phase-name">${phaseName}${currentTag}</div>
            <div class="phase-dates">${dateRange}</div>
          </div>
          <span class="badge phase-pill ${pc}">${pillText}</span>
        `;

        list.appendChild(li);
      });

      // Scroll current phase into view
      const currentEl = list.querySelector(".current");
      if (currentEl) {
        setTimeout(() => currentEl.scrollIntoView({ block: "nearest", behavior: "smooth" }), 100);
      }
    }

    function addPouch() {
      const state = getState();
      const today = todayStr();
      state.log[today] = (state.log[today] ?? 0) + 1;
      saveState(state); render(state);
    }

    function undoPouch() {
      const state = getState();
      const today = todayStr();
      if ((state.log[today] ?? 0) > 0) {
        state.log[today]--;
        saveState(state); render(state);
      }
    }

    function confirmReset() {
      if (confirm("Are you sure? This will delete all your data.")) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }

    // Init
    let state = getState();
    // Migrate old format (startDate was stored as quitDate, no targetQuitDate)
    if (state && !state.startDate) {
      localStorage.removeItem(STORAGE_KEY);
      state = null;
    }
    if (state) {
      showApp(state);
    } else {
      // Default target quit date to 4 weeks from today
      const def = new Date(); def.setDate(def.getDate() + 28);
      document.getElementById("quitDate").value = dateStr(def);
    }
  </script>
</body>
</html>
